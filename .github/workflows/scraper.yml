name: Run TCG Scraper

on:
  schedule:
    # Every ~2 min. Cheap because the scraper's due-filter (per-store
    # check_interval_minutes) means most runs find 0–3 stores actually due and
    # finish fast — NOT a 15x load increase over the old */15 cadence.
    - cron: '*/2 * * * *'
  workflow_dispatch:
    inputs:
      store_id:
        description: 'Specific store ID to scrape (empty = all enabled stores)'
        required: false
        type: string
      run_id:
        description: 'Scrape run ID for status tracking'
        required: false
        type: string

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tcg-tracker/scraper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tcg-tracker/scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binaries between runs so the ~2-min cadence
      # doesn't re-download chromium (~30-60s) on every run — most runs find 0
      # stores due and should finish fast. Keyed on the resolved deps so a
      # Playwright version bump busts the cache. Browsers install to
      # ~/.cache/ms-playwright on the Linux runner.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tcg-tracker/scraper/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Cache MISS → full download + OS deps. Cache HIT → only the (fast, per-run)
      # OS deps; the browser binary is restored from cache.
      - name: Install Playwright browser + OS deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (browser restored from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SCRAPE_STORE_ID: ${{ github.event.inputs.store_id }}
          SCRAPE_RUN_ID: ${{ github.event.inputs.run_id }}
        run: node scraper.js
