name: Run TCG Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      store_id:
        description: 'Specific store ID to scrape (empty = all enabled stores)'
        required: false
        type: string
      run_id:
        description: 'Scrape run ID for status tracking'
        required: false
        type: string

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tcg-tracker/scraper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tcg-tracker/scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SCRAPE_STORE_ID: ${{ github.event.inputs.store_id }}
          SCRAPE_RUN_ID: ${{ github.event.inputs.run_id }}
        run: node scraper.js
