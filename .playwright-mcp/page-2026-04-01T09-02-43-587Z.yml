                    - generic [ref=e387]: Bine ați venit în lumea deschisă a Pokémonilor! Pokémon Scarlet și Pokémon Violet, cele mai recente capitole din seria Pokémon, sosesc pe Nintendo Switch pe 18 noiembrie. Cu aceste titluri noi, seria Pokémon face un nou pas evolutiv, permițându-vă să explorați liber într-o lume deschisă vastă. Diferitele orașe se integrează perfect în sălbăticie fără limite. Veți vedea Pokémonii din această regiune în cer, în mări, în păduri, pe străzi – peste tot! Experimentați adevărata bucurie a seriei Pokémon – luptați împotriva Pokémonilor sălbatici pentru a-i captura – acum într-un joc cu lume deschisă, pe care îl pot savura jucătorii de orice vârstă. Împărtășiți bucuria descoperirii cu prietenii și familia, în timp ce porniți în aventura voastră alături de încă trei jucători!* Ceilalți trei Pokémoni din care vă puteți alege primul partener sunt Sprigatito, Fuecoco și Quaxly. Prezentarea personajelor Prietenă voastră, Nemona, este veselă, energică și adoră cu adevărat luptele Pokémon! Ca antrenor experimentat de Pokémon, vă va fi un ghid de încredere în aventurile voastre. În Pokémon Scarlet, veți întâlni profesorul Sada, în timp ce în Pokémon Violet veți întâlni profesorul Turo. Fiecare dintre ei explorează anumite tradiții transmise în regiune... Când porniți în aventura voastră, ținuta voastră va fi diferită în funcție de faptul că jucați Pokémon Scarlet sau Pokémon Violet. Cine știe ce poveste vă așteaptă? *Pentru modul multiplayer, este posibil să fie necesare accesorii suplimentare, jocuri și/sau sisteme care se vând separat. O conexiune la internet este necesară pentru jocul online. Pentru a utiliza serviciile online, trebuie să creați un cont Nintendo și să acceptați contractul aferent. Se aplică politica de confidențialitate a contului Nintendo. Unele servicii online pot să nu fie disponibile în toate țările. Jocul online necesită un abonament plătit. Aflați mai multe despre abonamentul plătit.
