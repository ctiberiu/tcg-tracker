        - button "+ Marketing": + Marketing
        - generic:
          - generic:
            - paragraph: Aceste cookie-uri sunt create pe site-ul nostru de catre partenerii nostrii de publicitate. Ele pot fi utilizate de aceste companii pentru a crea un cont al intereselor dvs. si pentru a permite afisarea anunturilor si mesajelor de pe alte site-uri. Functioneaza prin identificarea unica a browserului si dispozitivului dvs. Daca le blocati, nu veti primi reclama noastra orientata.
            - link "Google Tag Manager":
              - /url: https://www.google.com/analytics/tag-manager/
            - link "Facebook tracker":
              - /url: https://www.facebook.com/
            - link "TikTok tracker":
              - /url: https://www.tiktok.com/
        - button "+ Mai multa informatie"
        - generic:
          - generic:
            - paragraph: Ce reprezinta cookie-urile
            - paragraph: • Cookie-urile sunt fisiere cu informatii stocate pe hard disck-ul computerului dvs. Care inregistreaza modul in care navigati pe un site web, astfel incat atunci cand il vizitati din nou va prezinta cateva optiuni bazate pe informatiile stocate de la vizita anterioara. Cookie-urile pot fi utilizate atat pentru analiza traficului, cat si pentru publicitate si marketing.
            - paragraph: • Cookie-urile sunt utilizate de majoritatea site-urilor web si nu dauneaza sistemului de operare Daca doriti sa modificati sau sa verificati ce tip de cookie-uri acceptati, puteti face acest lucru in setarile browserului utilizat de dvs. Puteti bloca in orice moment toate cookie-urile sau doar unele dintre ele, activand setarea browserului care permite aceasta activitate. Dar daca blocati toate cookie-urile (inclusiv cookie-urile de baza), nu veti avea acces la tot sau la o anumita parte a site-ului nostru.
            - paragraph: Cum utilizam cookie-urile?
            - paragraph: • Cookie-urile ne ajuta sa intelegem cum utilizati site-ul nostru. Aceasta analiza ne ajuta sa dezvoltam sau sa imbunatatim site-ul, precum si produsele si /sau serviciile si sa putem sa va oferim ceea ce aveti nevoie.
            - paragraph: "• Cookie-urile sunt:"
            - paragraph: "- Cookie-uri de sesiune: Acestea sunt stocate in computerul dvs doar in timpul sesiuni web si sunt sterse automat la inchiderea browserului - stocheaza un numar de identificare anonim al sesiei, care va permite sa navigati pe site fara sa fie nevoie sa va logati pe fiecare pagina si nu stocheaza nicio informatie personala de pe computerul dvs."
            - paragraph: "- Cookie-uri persistente: Cookie-ul persistent este stocat ca si fisier in computer si ramane acolo cand inchideti browserul. Cookie-ul poate fi citit de site-ul care l-a creat atunci cand vizitati site-ul din nou."
            - paragraph: "• Cookie-urile pot fi, de asemenea clasificate dupa cum urmeaza:"
            - paragraph: "- Cookie-uri necesare: Aceste cookie-uri sunt esentiale pentru a putea utiliza site-ul in mod eficient, cum ar fi atunci cand achizitionati un produs si/sau serviciu si, prin urmare nu pot fi oprite. Fara aceste cookie-uri, serviciile disponibile pentru dvs. pe site-ul nostru nu pot fi furnizate. Aceste cookie-uri nu colecteaza informatii despre dvs. care sa fie folosite pentru marketing sau sa reaminteasca locul de acces la internet."
            - paragraph: "- Cookie-uri functionale: Aceste cookie-uri ne permit sa monitorizam si sa imbunatatim performantele site-ului nostru. Acestea ne permit sa urmarim vizitele, sa identificam sursele de trafic si sa urmarim cele mai utilizate parti ale site-ului."
            - paragraph: "- Cookie-uri de marketing: Aceste cookie-uri se creeaza pe site de catre partenerii nostrii de publicitate. Pot fi utilizate de aceste companii in scopul de a crea un profil al intereselor dvs. si permit afisarea reclamelor si mesajelor in afara platformei a altor site-uri. Functioneaza prin identificarea unica a browserului si dispozitivului dvs. Daca le blocati, nu veti primi reclama noastra orientata."