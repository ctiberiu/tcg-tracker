            - paragraph: Aceste cookie-uri sunt necesare ca site-ul sa functioneze corect si nu pot fi oprite. Acestea sunt de obicei utilizate pentru a mentine sau conecta setarile dvs. personale sau intrarea pe site. Puteti seta browserul pe care il utilizati pentru a bloca sau pentru a va notifica aceste cookie-uri, dar acest lucru va interfera cu functionalitatea site-ului.
            - link "Cloudflare":
              - /url: https://www.cloudflare.com
            - link "Facebook-jssdk":
              - /url: https://www.facebook.com/
        - button "+ Pentru eficienta": + Pentru eficienta
        - generic:
          - generic:
            - paragraph: Aceste cookie-uri ne permit sa analizam preferintele utilizatorilor site-ului si sa imbunatatim performantele acestuia. Datorita lor urmarim vizitele si sursele de trafic, urmarim care sunt paginile cele mai populare, care sunt mai putin populare si modul in care vizitatorii navigheaza pe site. Informatiile colectate sunt anonime. Daca blocati aceste cookie-uri, nu vom sti cand ati vizitat site-ul nostru.
            - link "Google Analytics":
