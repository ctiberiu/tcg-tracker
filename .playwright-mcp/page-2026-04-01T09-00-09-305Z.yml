        - heading "Despre confidențialitatea dvs" [level=3]
        - paragraph: Când vizitați un site web, acesta stochează sau accesează informații din browser-ul dvs. prin cookie-uri. Aceste informații sunt de obicei legate de preferințele dumneavoastră sau de dispozitivul dumneavoastră și sunt folosite pentru a îmbunătăți utilizarea site-ului. Puteți opri anumite tipuri de cookie-uri, dar blocarea acestora poate împiedica funcționarea corectă a site-ului.
        - generic:
